<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퇴직(연)금 중도인출 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1A73E8;
    --blue-light: #E8F0FE;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --red: #D93025;
    --red-light: #FCE8E6;
    --red-dark: #A50E0E;
    --orange: #F29900;
    --orange-light: #FEF3D0;
    --orange-dark: #7A4F00;
    --gray-100: #F8F9FA;
    --gray-200: #E8EAED;
    --gray-400: #9AA0A6;
    --gray-600: #5F6368;
    --gray-800: #3C4043;
    --gray-900: #202124;
    --white: #FFFFFF;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--gray-100);
    min-height: 100vh;
    color: var(--gray-900);
  }

  /* 헤더 */
  .header {
    background: var(--blue);
    padding: 20px 24px;
    text-align: center;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
  }

  /* 메인 */
  .main {
    max-width: 480px;
    margin: 32px auto;
    padding: 0 16px 60px;
  }

  /* 카드 선택 버튼 */
  .menu-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-600);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .menu-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .menu-card {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    text-align: left;
  }
  .menu-card:hover {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-light);
    transform: translateY(-1px);
  }
  .menu-card:active { transform: scale(0.99); }
  .menu-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .menu-icon.blue { background: var(--blue-light); }
  .menu-icon.green { background: var(--green-light); }
  .menu-label { font-size: 15px; font-weight: 700; color: var(--gray-900); }
  .menu-sub { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .menu-arrow { margin-left: auto; color: var(--gray-400); font-size: 16px; }

  /* 모달 오버레이 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.active { display: flex; }

  /* 모달 시트 */
  .modal-sheet {
    background: var(--white);
    width: 100%;
    max-width: 480px;
    border-radius: 20px;
    padding: 0 0 28px;
    max-height: 90vh;
    overflow-y: auto;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  @keyframes popIn {
    from { transform: scale(0.92); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* 모달 헤더 */
  .sheet-header {
    position: sticky;
    top: 0;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 18px 20px 16px;
    z-index: 10;
    border-radius: 20px 20px 0 0;
  }
  .sheet-top { display: flex; align-items: center; justify-content: space-between; }
  .sheet-title { font-size: 16px; font-weight: 700; color: var(--gray-900); }
  .close-btn {
    width: 30px; height: 30px;
    border: none; background: var(--gray-100);
    border-radius: 50%; cursor: pointer;
    font-size: 16px; color: var(--gray-600);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .close-btn:hover { background: var(--gray-200); }

  /* 진행 바 */
  .progress-wrap { padding: 14px 20px 0; }
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-step { font-size: 12px; color: var(--gray-400); }
  .progress-section { font-size: 12px; font-weight: 500; color: var(--blue); }
  .progress-track { height: 4px; background: var(--gray-200); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s ease; }

  /* 질문 카드 */
  .question-area { padding: 20px 20px 0; }
  .question-text { font-size: 18px; font-weight: 700; color: var(--gray-900); line-height: 1.55; margin-bottom: 10px; }
  .question-desc {
    font-size: 13px; color: var(--gray-600);
    background: var(--gray-100);
    border-left: 3px solid var(--blue);
    padding: 10px 12px;
    border-radius: 0 6px 6px 0;
    line-height: 1.6;
  }

  /* 버튼 */
  .btn-area { display: flex; gap: 10px; padding: 20px 20px 0; }
  .btn {
    flex: 1; padding: 14px 0;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    background: var(--white);
    transition: all 0.15s;
  }
  .btn-yes { color: var(--green); border-color: var(--green); }
  .btn-yes:hover { background: var(--green-light); }
  .btn-no  { color: var(--red);   border-color: var(--red); }
  .btn-no:hover  { background: var(--red-light); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* 결과 */
  .result-card {
    margin: 20px 20px 0;
    border-radius: var(--radius);
    padding: 20px;
  }
  .result-card.ok     { background: var(--green-light); border: 1.5px solid #5DCAA5; }
  .result-card.ng     { background: var(--red-light);   border: 1.5px solid #EF9F9F; }
  .result-card.warn   { background: var(--orange-light);border: 1.5px solid #F5C842; }
  .result-icon { font-size: 28px; margin-bottom: 8px; }
  .result-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .result-card.ok   .result-title { color: var(--green-dark); }
  .result-card.ng   .result-title { color: var(--red-dark); }
  .result-card.warn .result-title { color: var(--orange-dark); }
  .result-body  { font-size: 13px; line-height: 1.7; }
  .result-card.ok   .result-body { color: #085041; }
  .result-card.ng   .result-body { color: #6B1F1F; }
  .result-card.warn .result-body { color: var(--orange-dark); }

  /* 이전으로 */
  .back-btn {
    display: block; width: calc(100% - 40px);
    margin: 10px 20px 0;
    padding: 11px 0;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: var(--white);
    color: var(--gray-600);
    font-size: 14px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    transition: background 0.15s;
  }
  .back-btn:hover { background: var(--gray-100); }
  .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* 다시하기 */
  .restart-btn {
    display: block; width: calc(100% - 40px);
    margin: 14px 20px 0;
    padding: 12px 0;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: var(--white);
    color: var(--gray-600);
    font-size: 14px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: var(--gray-100); }

  /* 이력 */
  .history-wrap {
    margin: 20px 20px 0;
    border-top: 1px solid var(--gray-200);
    padding-top: 14px;
  }
  .history-title { font-size: 12px; font-weight: 700; color: var(--gray-400); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-item {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 12px; color: var(--gray-600);
    padding: 5px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .history-item:last-child { border-bottom: none; }
  .history-badge {
    font-size: 11px; font-weight: 700; padding: 1px 7px;
    border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  }
  .badge-y { background: var(--green-light); color: var(--green-dark); }
  .badge-n { background: var(--red-light);   color: var(--red-dark); }
</style>
</head>
<body>

<div class="header">
  <h1>퇴직(연)금 중도인출 안내</h1>
  <p>해당 항목을 선택하면 단계별 안내를 받을 수 있습니다</p>
</div>

<div class="main">
  <p class="menu-title">인출 사유 선택</p>
  <div class="menu-grid">
    <div class="menu-card" onclick="openModal('house')">
      <div class="menu-icon blue">🏠</div>
      <div>
        <div class="menu-label">무주택자 주택구입</div>
        <div class="menu-sub">본인 명의 주택 최초 구입 · 전세금/보증금 포함</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>
    <div class="menu-card" onclick="openModal('medical')">
      <div class="menu-icon green">🏥</div>
      <div>
        <div class="menu-label">6개월 이상 요양 의료비</div>
        <div class="menu-sub">본인·배우자·부양가족 질병·부상 요양</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal-sheet" id="modal-sheet">

    <div class="sheet-header">
      <div class="sheet-top">
        <div class="sheet-title" id="sheet-title"></div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-step" id="prog-label"></span>
        <span class="progress-section" id="prog-section"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-area" id="question-area">
      <div class="question-text" id="q-text"></div>
      <div class="question-desc" id="q-desc" style="display:none"></div>
    </div>

    <div class="btn-area" id="btn-area">
      <button class="btn btn-yes" id="btn-yes" onclick="answer(true)">예</button>
      <button class="btn btn-no"  id="btn-no"  onclick="answer(false)">아니오</button>
    </div>
    <button class="back-btn" id="back-btn" onclick="goBack()">← 이전으로</button>

    <div id="result-area"></div>
    <div id="history-area"></div>

  </div>
</div>

<script>
const flows = {
  house: {
    title: "무주택자 주택구입",
    steps: [
      {
        section: "기본 요건",
        q: "현재 무주택자인가요?",
        desc: "신청일 기준으로 무주택자여야 합니다. 과거에 주택을 소유한 이력이 있어도 현재 무주택이면 가능합니다.",
        yes: 1, no: { type:"ng", title:"무주택자 요건 미충족", body:"현재 주택을 소유하고 있다면 이 사유로 중도인출이 불가합니다.\n(단, 보유 주택을 매도하고 새 주택을 구입하는 날이 동일한 경우도 불가)" }
      },
      {
        section: "명의 확인",
        q: "본인 명의로 주택을 구입하나요?",
        desc: "배우자 또는 가족 명의 구입은 해당되지 않습니다.",
        yes: 2, no: { type:"ng", title:"명의 요건 미충족", body:"퇴직금 중간정산·퇴직연금 중도인출은 본인 명의 주택 구입에 한합니다." }
      },
      {
        section: "중복 신청 여부",
        q: "이 사업장(회사)에서 전세/보증금 사유로 중도인출을 받은 적이 있나요?",
        desc: "전세금·보증금 목적 인출은 동일 사업장에서 1회만 가능합니다. 주택 구입은 횟수 제한 없음.",
        yes: { type:"warn", title:"전세금 사유 이미 사용", body:"전세금/보증금 사유는 1회로 한정됩니다. 단, 주택 구입 목적이라면 별도이므로 다음 단계로 진행 가능합니다.\n인사팀 또는 퇴직연금 사업자에게 확인해 주세요." },
        no: 3
      },
      {
        section: "신청 시기",
        q: "소유권 이전 등기일(계약 체결일) 기준 3개월 이내인가요?",
        desc: "주택 구입의 경우 잔금 지급일 또는 소유권 이전 등기일로부터 3개월 이내 신청해야 합니다.",
        yes: { type:"ok", title:"중도인출 신청 가능", body:"모든 요건을 충족합니다!\n\n필요 서류: 매매계약서, 등기사항전부증명서(등기부등본), 무주택 확인서류(주민등록등본)\n\n퇴직연금 사업자에 서류를 제출하여 신청하세요.\n\n※ 주택 구입 사유 인출 시 퇴직소득세율 100%가 적용됩니다." },
        no: { type:"ng", title:"신청 기한 초과", body:"소유권 이전 등기 후 3개월이 경과하면 이 사유로 신청이 불가합니다.\n다른 중도인출 사유(요양 등)에 해당하는지 확인해 보세요." }
      }
    ]
  },

  medical: {
    title: "6개월 이상 요양 의료비",
    steps: [
      {
        section: "가입 여부",
        q: "퇴직연금(DC형 / IRP) 또는 퇴직금 제도에 가입되어 있나요?",
        desc: "회사 인사팀 또는 급여명세서를 통해 가입 제도를 확인할 수 있습니다.",
        yes: 1, no: { type:"ng", title:"퇴직급여 미가입", body:"퇴직급여 제도에 가입되어 있지 않으면 중간정산·중도인출 신청이 불가합니다.\n먼저 회사 인사팀에 가입 여부를 확인해 주세요." }
      },
      {
        section: "제도 유형",
        q: "가입 제도가 DB형(확정급여형) 퇴직연금 단독인가요?",
        desc: "DB형만 가입된 경우 중도인출이 불가합니다. DC형 또는 IRP가 있다면 '아니오'를 선택하세요.",
        yes: { type:"ng", title:"DB형 단독 — 중도인출 불가", body:"DB형 퇴직연금은 법적으로 중도인출이 불가합니다.\n\n대안:\n① 법정 사유 충족 시 담보대출 가능\n② 원하면 DC형으로 전환 후 인출 가능 (회사 동의 필요)\n\n인사팀에 DC형 전환 가능 여부를 문의하세요." },
        no: 2
      },
      {
        section: "요양 대상자",
        q: "요양이 필요한 분이 본인·배우자·부양가족에 해당하나요?",
        desc: "부양가족 범위:\n• 60세 이상 직계존속\n• 20세 이하 직계비속·동거 입양자\n• 20세 이하 또는 60세 이상 형제자매\n• 기초생활수급자\n• 가정위탁 아동",
        yes: 3, no: { type:"ng", title:"대상자 요건 미충족", body:"중도인출 가능 요양 대상자는 본인, 배우자, 법정 부양가족으로 한정됩니다.\n해당 관계가 아니라면 이 사유로는 신청이 어렵습니다." }
      },
      {
        section: "요양 기간",
        q: "의사로부터 6개월 이상 요양이 필요하다는 진단을 받았나요?",
        desc: "진단서 또는 소견서에 요양 기간이 명시되어야 합니다. 6개월 미만이면 해당 사유로 신청 불가입니다.",
        yes: 4, no: { type:"ng", title:"요양 기간 미충족", body:"요양 기간이 6개월 미만이면 이 사유로는 중도인출이 불가합니다.\n다른 중도인출 사유(주택 구입, 파산 등)에 해당하는지 확인해 보세요." }
      },
      {
        section: "질병·부상 여부",
        q: "요양 원인이 질병 또는 부상인가요?",
        desc: "단순 건강검진, 미용·성형 목적, 예방적 치료 등은 해당하지 않습니다.",
        yes: 5, no: { type:"ng", title:"질병·부상 요건 미충족", body:"질병 또는 부상으로 인한 요양이 아닌 경우 이 사유로 중도인출이 불가합니다." }
      },
      {
        section: "제도 유형 확인",
        q: "가입하신 제도가 개인형 IRP인가요?",
        desc: "개인형 IRP는 의료비 금액 기준 없이 신청 가능합니다.\nDC형·기업형 IRP는 다음 단계에서 의료비 기준을 확인합니다.",
        yes: 7, no: 6
      },
      {
        section: "의료비 요건 (DC형·기업형IRP)",
        q: "해당 의료비가 본인 연간 임금총액의 12.5%(1/8)를 초과하나요?",
        desc: "예) 연봉 4,000만원이면 의료비가 500만원을 초과해야 합니다.\n연간 임금총액은 직전년도 임금 총액 기준입니다.",
        yes: 7, no: { type:"ng", title:"의료비 요건 미충족", body:"DC형·기업형IRP는 의료비가 연간 임금총액의 12.5%를 초과해야 중도인출이 가능합니다.\n\n개인형 IRP는 이 요건이 없으므로, 추가 IRP 계좌 개설도 고려해 볼 수 있습니다." }
      },
      {
        section: "신청 시기 및 서류",
        q: "요양 종료일 이후 1개월 이내에 신청하실 수 있나요?",
        desc: "요양 사유 확인이 가능한 날부터, 요양 종료일 이후 1개월 이내에 신청해야 합니다.\n요양 중에도 신청 가능합니다.",
        yes: { type:"ok", title:"중도인출 신청 가능", body:"모든 요건을 충족합니다!\n\n필요 서류:\n• 진단서 또는 장기요양 소견서\n• 가족관계증명서 (배우자·부양가족인 경우)\n• 의료비 영수증\n\n퇴직연금 사업자에 서류를 제출하여 신청하세요.\n\n※ 장기요양 사유 인출 시 연금소득세(3.3~5.5%) 적용으로 일반 인출보다 세 부담이 낮습니다." },
        no: { type:"warn", title:"신청 시기 확인 필요", body:"요양 종료 후 1개월이 경과했을 수 있습니다.\n정확한 신청 가능 기간을 퇴직연금 사업자(은행·증권사)에 문의해 주세요." }
      }
    ]
  }
};

let currentFlow = null;
let currentStep = 0;
let answered = [];

function openModal(type) {
  currentFlow = flows[type];
  currentStep = 0;
  answered = [];
  document.getElementById('sheet-title').textContent = currentFlow.title;
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('history-area').innerHTML = '';
  renderStep();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function renderStep() {
  const steps = currentFlow.steps;
  const s = steps[currentStep];
  const total = steps.length;
  const pct = Math.round((currentStep / total) * 100);

  document.getElementById('prog-label').textContent = `질문 ${currentStep + 1} / ${total}`;
  document.getElementById('prog-section').textContent = s.section;
  document.getElementById('prog-fill').style.width = pct + '%';

  document.getElementById('q-text').textContent = s.q;
  const descEl = document.getElementById('q-desc');
  if (s.desc) {
    descEl.style.display = 'block';
    descEl.innerHTML = s.desc.replace(/\n/g, '<br>');
  } else {
    descEl.style.display = 'none';
  }

  document.getElementById('question-area').style.display = 'block';
  document.getElementById('btn-area').style.display = 'flex';
  document.getElementById('btn-yes').disabled = false;
  document.getElementById('btn-no').disabled = false;
  document.getElementById('result-area').innerHTML = '';

  const backBtn = document.getElementById('back-btn');
  backBtn.style.display = 'block';
  backBtn.disabled = answered.length === 0;
}

function answer(yes) {
  const s = currentFlow.steps[currentStep];
  answered.push({ q: s.q, a: yes, stepIndex: currentStep });

  const next = yes ? s.yes : s.no;

  if (typeof next === 'object') {
    showResult(next);
  } else {
    currentStep = next;
    renderStep();
  }
  renderHistory();
}

function goBack() {
  if (answered.length === 0) return;
  const last = answered.pop();
  currentStep = last.stepIndex;
  document.getElementById('result-area').innerHTML = '';
  renderStep();
  renderHistory();
}

function showResult(r) {
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = '완료';
  document.getElementById('prog-section').textContent = '결과';

  document.getElementById('question-area').style.display = 'none';
  document.getElementById('btn-area').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';

  const icons = { ok: '✅', ng: '❌', warn: '⚠️' };
  const html = `
    <div class="result-card ${r.type}">
      <div class="result-icon">${icons[r.type]}</div>
      <div class="result-title">${r.title}</div>
      <div class="result-body">${r.body.replace(/\n/g,'<br>')}</div>
    </div>
    <button class="back-btn" style="display:block" onclick="goBack()">← 이전으로</button>
    <button class="restart-btn" onclick="restart()">↺ 처음부터 다시하기</button>
  `;
  document.getElementById('result-area').innerHTML = html;
}

function restart() {
  currentStep = 0;
  answered = [];
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('history-area').innerHTML = '';
  renderStep();
}

function renderHistory() {
  if (!answered.length) return;
  const items = answered.map(h => `
    <div class="history-item">
      <span class="history-badge ${h.a ? 'badge-y' : 'badge-n'}">${h.a ? '예' : '아니오'}</span>
      <span>${h.q}</span>
    </div>
  `).join('');
  document.getElementById('history-area').innerHTML = `
    <div class="history-wrap">
      <div class="history-title">답변 이력</div>
      ${items}
    </div>
  `;
}
</script>

</html>
