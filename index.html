<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>퇴직연금 중도인출 안내</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f7fa;
  }

  h2 {
    text-align: center;
    margin-top: 40px;
  }

  /* 가운데 정렬 */
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
  }

  /* 클릭 영역은 텍스트만 */
  .title span {
    cursor: pointer;
    display: inline-block;
    padding: 10px 20px;
    margin: 8px 0;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    transition: all 0.2s;
  }

  .title span:hover {
    background: #007BFF;
    color: #fff;
    transform: translateY(-2px);
  }

  /* 모달 전체 */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);

    /* 중앙 정렬 */
    justify-content: center;
    align-items: center;
  }

  /* 팝업 박스 */
  .modal-content {
    background: #fff;
    width: 400px;
    max-width: 90%;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    position: relative;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
  }

  /* 닫기 버튼 (X) */
  .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 18px;
    cursor: pointer;
  }

  button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #007BFF;
    color: white;
  }

  button:hover {
    background: #0056b3;
  }

/* 헤더바 */
.header {
  background: #007BFF;
  color: white;
  padding: 20px 0;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* 제목 여백 제거 (헤더 안으로 들어갔으니까) */
.header h2 {
  margin: 0;
}

/* 컨텐츠 영역 여백 늘리기 */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 60px;  /* 기존보다 여유 있게 */
}

</style>
</head>

<body>

<div class="header">
  <h2>퇴직(연)금 중도인출 안내</h2>
</div>

<div class="container">
  <div class="title">
    <span onclick="openModal('house')">1. 무주택자 주택구입</span>
  </div>
  <div class="title">
    <span onclick="openModal('medical')">2. 병원비 목적 중도인출</span>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">

    <span class="close-btn" onclick="closeModal()">✖</span>

    <!-- 게이지 -->
    <div style="height:6px; background:#eee; border-radius:10px; margin-bottom:20px;">
      <div id="progress-bar" style="height:6px; width:0%; background:#28a745;"></div>
    </div>

    <!-- 카드 -->
    <div style="border:1px solid #ddd; border-radius:12px; padding:20px;">
      
      <div style="color:#007BFF; font-weight:bold;">기본 요건</div>
      <div id="step-text" style="color:#888; margin:5px 0;"></div>

      <div id="question" style="font-size:18px; margin:10px 0;"></div>
      <div id="desc" style="font-size:13px; color:#777; margin-bottom:20px;"></div>

      <div id="btn-area">
        <button id="yesBtn" onclick="answer('예')">예</button>
        <button id="noBtn" onclick="answer('아니오')">아니오</button>
      </div>

      <div id="restart-area" style="display:none; margin-top:15px;">
        <button onclick="restart()">처음부터 다시하기</button>
      </div>

    </div>

    <!-- 이력 -->
    <div id="history" style="margin-top:20px;"></div>

  </div>
</div>

<script>
let step = 0;
let history = [];
let ended = false;
let currentType = "";

/* 데이터 */
const flows = {

  house: [
    { q: "본인 명의의 집을 구매하는건가요?", desc: "배우자/가족 명의는 제외" },
    { q: "이전에 주택구입 중도인출을 받은 적이 있나요?", desc: "1회만 가능" },
    { q: "소유권 이전 등기 1개월 이내인가요?", desc: "기한 초과 시 불가" }
  ],

  medical: [
    { q: "퇴직연금(DC/IRP)에 가입되어 있나요?", desc: "" },
    { q: "DB형 단독인가요?", desc: "DB형은 불가" },
    { q: "요양 대상자가 본인/배우자/부양가족인가요?", desc: "" },
    { q: "6개월 이상 요양 진단인가요?", desc: "" },
    { q: "질병 또는 부상인가요?", desc: "" },
    { q: "개인형 IRP인가요?", desc: "IRP는 의료비 조건 제외" },
    { q: "의료비가 임금의 12.5% 초과인가요?", desc: "" },
    { q: "신청 시기 및 서류 준비 완료인가요?", desc: "" }
  ]
};

/* 시작 */
function openModal(type) {
  currentType = type;
  resetAll();
  document.getElementById('modal').style.display = 'flex';
  render();
}

/* 초기화 */
function resetAll() {
  step = 0;
  history = [];
  ended = false;

  document.getElementById('history').innerHTML = "";
  document.getElementById('restart-area').style.display = "none";
  enableButtons();
}

/* 렌더 */
function render() {
  const data = flows[currentType][step];

  document.getElementById('question').innerText = data.q;
  document.getElementById('desc').innerText = data.desc;
  document.getElementById('step-text').innerText = `질문 ${step+1}/${flows[currentType].length}`;

  let percent = (step / flows[currentType].length) * 100;
  document.getElementById('progress-bar').style.width = percent + "%";
}

/* 답변 */
function answer(choice) {

  if (ended) return;

  const q = flows[currentType][step].q;
  history.push({ q, a: choice });
  renderHistory();

  /* ===== 1번 ===== */
  if (currentType === "house") {

    if (step === 0 && choice === "아니오") return end("불가", "본인 명의 주택이 아닙니다.");
    if (step === 1 && choice === "예") return end("불가", "주택구입은 1회만 가능합니다.");

    if (step === 2) {
      if (choice === "예") return end("가능", "중도인출 가능 대상입니다.");
      else return end("불가", "신청 기한 초과입니다.");
    }
  }

  /* ===== 2번 ===== */
  if (currentType === "medical") {

    if (step === 0 && choice === "아니오") return end("불가", "퇴직연금 미가입");
    if (step === 1 && choice === "예") return end("불가", "DB형 단독 불가");
    if (step === 2 && choice === "아니오") return end("불가", "대상자 조건 미충족");
    if (step === 3 && choice === "아니오") return end("불가", "요양기간 미충족");
    if (step === 4 && choice === "아니오") return end("불가", "질병/부상 아님");

    if (step === 5 && choice === "예") {
      step = 7;
      return render();
    }

    if (step === 6 && choice === "아니오") return end("불가", "의료비 기준 미충족");

    if (step === 7) {
      if (choice === "예") return end("가능", "중도인출 가능");
      else return end("확인 필요", "서류 확인 필요");
    }
  }

  step++;
  render();
}

/* 종료 */
function end(type, msg) {
  ended = true;

  document.getElementById('question').innerText = `${type} - ${msg}`;
  document.getElementById('desc').innerText = "";
  document.getElementById('progress-bar').style.width = "100%";

  disableButtons();
  document.getElementById('restart-area').style.display = "block";
}

/* 버튼 */
function disableButtons() {
  yesBtn.disabled = true;
  noBtn.disabled = true;
}
function enableButtons() {
  yesBtn.disabled = false;
  noBtn.disabled = false;
}

/* 이력 */
function renderHistory() {
  let html = "<hr><b>답변 이력</b><br>";
  history.forEach(item => {
    let color = item.a === "예" ? "green" : "red";
    html += `<span style="color:${color}">${item.a}</span> - ${item.q}<br>`;
  });
  document.getElementById('history').innerHTML = html;
}

/* 다시하기 */
function restart() {
  resetAll();
  render();
}

/* 닫기 */
function closeModal() {
  document.getElementById('modal').style.display = 'none';
  resetAll();
}

/* 바깥 클릭 */
window.onclick = function(e) {
  if (e.target === modal) closeModal();
}
</script>

</body>
</html>
